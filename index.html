<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>科技新闻日报 · 导航</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0d16;
  --surface: #0f1220;
  --surface2: #131828;
  --border: rgba(255,255,255,0.07);
  --text: #e2e6f0;
  --text-muted: #8892a4;
  --purple: #a78bfa;
  --blue: #60a5fa;
  --blue2: #3b82f6;
  --green: #22c55e;
  --cyan: #2dd4bf;
  --sky: #38bdf8;
  --yellow: #fbbf24;
  --orange: #f97316;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 15px;
  line-height: 1.7;
  min-height: 100vh;
}
.header {
  text-align: center;
  padding: 60px 20px 40px;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -60px; left: 50%;
  transform: translateX(-50%);
  width: 600px; height: 300px;
  background: radial-gradient(ellipse, rgba(96,165,250,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.header-badge {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--blue);
  border: 1px solid rgba(96,165,250,0.4);
  border-radius: 24px;
  padding: 4px 14px;
  margin-bottom: 20px;
}
.header h1 {
  font-size: 3.2rem;
  font-weight: 700;
  letter-spacing: -1px;
  margin-bottom: 14px;
  line-height: 1.1;
}
.gradient-text {
  background: linear-gradient(90deg, #667eea, #764ba2, #a78bfa, #60a5fa, #3b82f6, #667eea);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: flowGradient 8s linear infinite;
}
@keyframes flowGradient {
  0% { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}
.header-desc {
  font-size: 16px;
  color: var(--text-muted);
  margin-top: 10px;
}
.container { max-width: 800px; margin: 0 auto; padding: 0 20px 60px; }
.date-section { margin-bottom: 40px; }
.section-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 16px;
  padding-left: 8px;
  border-left: 3px solid var(--blue);
}
.date-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}
.date-card {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  text-decoration: none;
  color: var(--text);
  transition: all 0.2s ease;
}
.date-card:hover {
  background: var(--surface2);
  border-color: rgba(96,165,250,0.3);
  transform: translateY(-2px);
}
.date-icon { font-size: 28px; }
.date-info { flex: 1; }
.date-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
}
.date-meta {
  font-size: 13px;
  color: var(--text-muted);
}
.date-arrow { color: var(--blue); font-size: 18px; }
.date-card.latest {
  border-color: rgba(96,165,250,0.5);
  background: linear-gradient(135deg, rgba(96,165,250,0.1) 0%, transparent 50%);
}
.latest-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  background: rgba(96,165,250,0.2);
  color: var(--blue);
  padding: 2px 8px;
  border-radius: 12px;
  margin-left: 8px;
}
.footer {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
  font-size: 13px;
}
.footer a { color: var(--blue); text-decoration: none; }
@media (max-width: 680px) {
  .header { padding: 40px 16px 30px; }
  .header h1 { font-size: 2rem; }
  .date-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-badge">TECH NEWS DAILY</div>
  <h1><span class="gradient-text">科技新闻日报</span></h1>
  <p class="header-desc">每日精选科技资讯 · 按日期浏览</p>
</header>

<div class="container">

  <div class="date-section">
    <div class="section-title">Latest · 最新</div>
    <div class="date-grid">
      <a href="2026-04-04.html" class="date-card latest">
        <span class="date-icon">📰</span>
        <div class="date-info">
          <div class="date-label">4月4日 <span class="latest-badge">NEW</span></div>
          <div class="date-meta">2026.04.04 · 周五</div>
        </div>
        <span class="date-arrow">→</span>
      </a>
    </div>
  </div>

  <div class="date-section">
    <div class="section-title">Archive · 往期</div>
    <div class="date-grid">
      <a href="2026-04-01.html" class="date-card">
        <span class="date-icon">📰</span>
        <div class="date-info">
          <div class="date-label">4月1日</div>
          <div class="date-meta">2026.04.01 · 周三</div>
        </div>
        <span class="date-arrow">→</span>
      </a>
      
      <a href="daily_news_2026-03-31.html" class="date-card">
        <span class="date-icon">📰</span>
        <div class="date-info">
          <div class="date-label">3月31日</div>
          <div class="date-meta">2026.03.31 · 周二</div>
        </div>
        <span class="date-arrow">→</span>
      </a>
    </div>
  </div>

</div>

<div class="footer">
  <p>Generated by OPC · 科技新闻日报</p>
  <p style="margin-top: 8px;"><a href="https://github.com/arkham-YJ/tech-news-daily">GitHub Repository</a></p>
</div>

</body>
</html>
